<svg width="900" height="650" viewBox="0 0 900 650" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="650">
      <stop stop-color="#0b1f38"/>
      <stop offset=".55" stop-color="#071427"/>
      <stop offset="1" stop-color="#030a16"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="28%" r="50%">
      <stop stop-color="#f2d275" stop-opacity=".16"/>
      <stop offset="1" stop-color="#f2d275" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="portraitGlow" cx="50%" cy="30%" r="60%">
      <stop stop-color="#f2d275" stop-opacity=".55"/>
      <stop offset="1" stop-color="#f2d275" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity=".4"/>
    </filter>
    <linearGradient id="cardA" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0d2440"/>
      <stop offset="1" stop-color="#071427"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0a1a30"/>
      <stop offset="1" stop-color="#050f20"/>
    </linearGradient>
  </defs>

  <rect width="900" height="650" fill="url(#bg)"/>
  <rect width="900" height="650" fill="url(#glow)"/>

  <!-- card: EVENTOS (right, tilted right) -->
  <g filter="url(#soft)" transform="rotate(9 690 340)">
    <rect x="530" y="185" width="260" height="330" rx="18" fill="url(#cardB)" stroke="#f2d27540" stroke-width="1.5"/>
    <path d="M560 340 C560 275 620 230 660 230 C700 230 760 275 760 340" stroke="#f2d275" stroke-opacity=".55" stroke-width="2" fill="none"/>
    <circle cx="560" cy="340" r="3.5" fill="#f2d275"/>
    <circle cx="596" cy="270" r="3.5" fill="#f2d275" opacity=".85"/>
    <circle cx="638" cy="235" r="3.5" fill="#f2d275"/>
    <circle cx="682" cy="235" r="3.5" fill="#f2d275" opacity=".85"/>
    <circle cx="724" cy="270" r="3.5" fill="#f2d275"/>
    <circle cx="760" cy="340" r="3.5" fill="#f2d275" opacity=".85"/>
    <rect x="560" y="340" width="200" height="120" fill="#050f20"/>
    <path d="M560 400 L610 360 L650 390 L700 350 L760 400 V460 H560 Z" fill="#0a1d34"/>
    <text x="660" y="500" text-anchor="middle" fill="#f2d275" font-family="Inter, sans-serif" font-size="12" letter-spacing="3">EVENTOS</text>
  </g>

  <!-- card: ENSAIOS FOTOGRÁFICOS (center, front) -->
  <g filter="url(#soft)">
    <rect x="330" y="140" width="260" height="380" rx="18" fill="url(#cardA)" stroke="#f2d27566" stroke-width="1.5"/>
    <rect x="330" y="140" width="260" height="380" rx="18" fill="url(#portraitGlow)"/>
    <path d="M460 210 C430 210 408 236 408 268 C408 292 420 310 438 320 L438 336 C398 348 372 378 366 416 L554 416 C548 378 522 348 482 336 L482 320 C500 310 512 292 512 268 C512 236 490 210 460 210Z" fill="#02070f" opacity=".82"/>
    <circle cx="460" cy="268" r="86" fill="none" stroke="#f2d275" stroke-opacity=".35" stroke-width="1.5"/>
    <text x="460" y="470" text-anchor="middle" fill="#f5e9c8" font-family="Georgia, serif" font-size="17" letter-spacing="1">ENSAIOS</text>
    <text x="460" y="492" text-anchor="middle" fill="#f2d275" font-family="Inter, sans-serif" font-size="11" letter-spacing="3" opacity=".8">FOTOGRÁFICOS</text>
  </g>

  <!-- card: IDENTIDADE (left, tilted left) -->
  <g filter="url(#soft)" transform="rotate(-8 190 330)">
    <rect x="110" y="205" width="230" height="290" rx="16" fill="url(#cardB)" stroke="#f2d27540" stroke-width="1.5"/>
    <image href="../logo/logo-atlantico-studio.png" x="150" y="245" width="60" height="60" clip-path="circle(30px at 30px 30px)"/>
    <circle cx="180" cy="275" r="31" fill="none" stroke="#f2d275" stroke-opacity=".5" stroke-width="1.2"/>
    <line x1="140" y1="335" x2="310" y2="335" stroke="#f2d27540" stroke-width="1"/>
    <g transform="translate(140 355)">
      <rect x="0" y="0" width="32" height="32" rx="6" fill="#071427" stroke="#f2d27555"/>
      <rect x="40" y="0" width="32" height="32" rx="6" fill="#caa45d"/>
      <rect x="80" y="0" width="32" height="32" rx="6" fill="#f2d275"/>
      <rect x="120" y="0" width="32" height="32" rx="6" fill="#f3ead5"/>
    </g>
    <text x="180" y="435" text-anchor="middle" fill="#f2d275" font-family="Inter, sans-serif" font-size="12" letter-spacing="3">IDENTIDADE</text>
  </g>

  <text x="450" y="608" text-anchor="middle" fill="#f3ead5" font-family="Inter, sans-serif" font-size="13" letter-spacing="2" opacity=".38">EXEMPLO ILUSTRATIVO — AGUARDANDO MATERIAL REAL DO CLIENTE</text>
</svg>
