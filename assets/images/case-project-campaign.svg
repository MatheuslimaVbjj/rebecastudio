<svg width="900" height="650" viewBox="0 0 900 650" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="650">
      <stop stop-color="#0b1f38"/>
      <stop offset=".6" stop-color="#071427"/>
      <stop offset="1" stop-color="#030a16"/>
    </linearGradient>
    <radialGradient id="glow" cx="28%" cy="76%" r="55%">
      <stop stop-color="#f2d275" stop-opacity=".14"/>
      <stop offset="1" stop-color="#f2d275" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity=".42"/>
    </filter>
    <linearGradient id="p1" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0d2440"/><stop offset="1" stop-color="#071427"/></linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#caa45d"/><stop offset="1" stop-color="#8a6a34"/></linearGradient>
    <linearGradient id="p3" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0a1a30"/><stop offset="1" stop-color="#050f20"/></linearGradient>
  </defs>
  <rect width="900" height="650" fill="url(#bg)"/>
  <rect width="900" height="650" fill="url(#glow)"/>

  <!-- phone mockup -->
  <g filter="url(#soft)">
    <rect x="300" y="60" width="300" height="530" rx="36" fill="#050f20" stroke="#f2d27555" stroke-width="2"/>
    <rect x="316" y="92" width="268" height="466" rx="6" fill="#030a16"/>

    <!-- app header -->
    <circle cx="344" cy="112" r="10" fill="#f2d27540"/>
    <rect x="362" y="106" width="90" height="10" rx="5" fill="#f3ead550"/>

    <!-- feed grid 3x3 -->
    <g transform="translate(316 140)">
      <rect x="0" y="0" width="87" height="87" fill="url(#p1)"/>
      <rect x="91" y="0" width="87" height="87" fill="url(#p2)"/>
      <rect x="182" y="0" width="86" height="87" fill="url(#p3)"/>

      <rect x="0" y="91" width="87" height="87" fill="url(#p3)"/>
      <rect x="91" y="91" width="87" height="87" fill="url(#p1)"/>
      <rect x="182" y="91" width="86" height="87" fill="url(#p2)"/>

      <rect x="0" y="182" width="87" height="87" fill="url(#p2)"/>
      <rect x="91" y="182" width="87" height="87" fill="url(#p3)"/>
      <rect x="182" y="182" width="86" height="87" fill="url(#p1)"/>

      <!-- subtle play/campaign icons -->
      <circle cx="43" cy="43" r="14" fill="none" stroke="#f3ead590" stroke-width="1.4"/>
      <circle cx="225" cy="225" r="14" fill="none" stroke="#03111a90" stroke-width="1.4"/>
    </g>

    <rect x="316" y="512" width="268" height="46" fill="#050f20"/>
    <rect x="336" y="530" width="140" height="10" rx="5" fill="#f3ead550"/>
  </g>

  <!-- floating engagement callout -->
  <g filter="url(#soft)" transform="translate(600 220)">
    <rect width="180" height="88" rx="16" fill="#0a1a30" stroke="#f2d27555" stroke-width="1.5"/>
    <text x="20" y="36" fill="#f2d275" font-family="Georgia, serif" font-size="26">+38%</text>
    <text x="20" y="60" fill="#f3ead5" font-family="Inter, sans-serif" font-size="11" opacity=".65" letter-spacing="1">ENGAJAMENTO</text>
  </g>

  <!-- floating traffic callout -->
  <g filter="url(#soft)" transform="translate(60 400)">
    <rect width="180" height="88" rx="16" fill="#0a1a30" stroke="#f2d27555" stroke-width="1.5"/>
    <text x="20" y="36" fill="#f2d275" font-family="Georgia, serif" font-size="26">+52%</text>
    <text x="20" y="60" fill="#f3ead5" font-family="Inter, sans-serif" font-size="11" opacity=".65" letter-spacing="1">TRÁFEGO</text>
  </g>

  <text x="450" y="628" text-anchor="middle" fill="#f3ead5" font-family="Inter, sans-serif" font-size="12" letter-spacing="2" opacity=".32">DIREÇÃO DE PROJETO — CAMPANHA DIGITAL</text>
</svg>
