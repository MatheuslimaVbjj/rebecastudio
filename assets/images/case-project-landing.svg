<svg width="900" height="650" viewBox="0 0 900 650" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="650">
      <stop stop-color="#0b1f38"/>
      <stop offset=".6" stop-color="#071427"/>
      <stop offset="1" stop-color="#030a16"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="20%" r="55%">
      <stop stop-color="#f2d275" stop-opacity=".14"/>
      <stop offset="1" stop-color="#f2d275" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="heroBlock" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0d2440"/>
      <stop offset="1" stop-color="#071427"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000000" flood-opacity=".4"/>
    </filter>
  </defs>
  <rect width="900" height="650" fill="url(#bg)"/>
  <rect width="900" height="650" fill="url(#glow)"/>

  <!-- browser window mockup -->
  <g filter="url(#soft)">
    <rect x="90" y="75" width="720" height="500" rx="16" fill="url(#heroBlock)" stroke="#f2d27540" stroke-width="1.5"/>

    <!-- browser chrome bar -->
    <rect x="90" y="75" width="720" height="42" rx="16" fill="#050f20"/>
    <rect x="90" y="101" width="720" height="16" fill="#050f20"/>
    <circle cx="118" cy="96" r="5" fill="#f2d27566"/>
    <circle cx="138" cy="96" r="5" fill="#f2d27544"/>
    <circle cx="158" cy="96" r="5" fill="#f2d27530"/>
    <rect x="330" y="87" width="240" height="18" rx="9" fill="#0a1a30"/>
    <text x="450" y="100" text-anchor="middle" fill="#f3ead5" font-family="Inter, sans-serif" font-size="10" opacity=".45">atlanticostudio.pt</text>

    <!-- hero content -->
    <rect x="140" y="165" width="300" height="20" rx="4" fill="#f2d275" opacity=".85"/>
    <rect x="140" y="200" width="420" height="34" rx="6" fill="#f5e9c8"/>
    <rect x="140" y="244" width="380" height="34" rx="6" fill="#f5e9c8" opacity=".9"/>
    <rect x="140" y="298" width="340" height="14" rx="4" fill="#f3ead5" opacity=".4"/>
    <rect x="140" y="320" width="280" height="14" rx="4" fill="#f3ead5" opacity=".4"/>

    <rect x="140" y="360" width="168" height="46" rx="10" fill="#f2d275"/>
    <text x="224" y="388" text-anchor="middle" fill="#03111a" font-family="Inter, sans-serif" font-size="13" font-weight="700">Solicitar orçamento</text>
    <rect x="322" y="360" width="140" height="46" rx="10" fill="none" stroke="#f3ead580" stroke-width="1.5"/>

    <!-- decorative visual block -->
    <rect x="600" y="150" width="150" height="260" rx="14" fill="#0a1a30" stroke="#f2d27540"/>
    <circle cx="675" cy="240" r="46" fill="none" stroke="#f2d275" stroke-opacity=".4" stroke-width="1.5"/>
    <path d="M628 330 C650 300 700 300 722 330" stroke="#f2d275" stroke-opacity=".35" stroke-width="2" fill="none"/>

    <!-- cards row -->
    <g transform="translate(140 450)">
      <rect x="0" y="0" width="140" height="90" rx="10" fill="#0a1a30" stroke="#f2d27530"/>
      <rect x="16" y="16" width="24" height="24" rx="6" fill="#f2d27530"/>
      <rect x="16" y="52" width="100" height="8" rx="4" fill="#f3ead560"/>
      <rect x="16" y="66" width="70" height="8" rx="4" fill="#f3ead535"/>

      <rect x="160" y="0" width="140" height="90" rx="10" fill="#0a1a30" stroke="#f2d27530"/>
      <rect x="176" y="16" width="24" height="24" rx="6" fill="#f2d27530"/>
      <rect x="176" y="52" width="100" height="8" rx="4" fill="#f3ead560"/>
      <rect x="176" y="66" width="70" height="8" rx="4" fill="#f3ead535"/>

      <rect x="320" y="0" width="140" height="90" rx="10" fill="#0a1a30" stroke="#f2d27530"/>
      <rect x="336" y="16" width="24" height="24" rx="6" fill="#f2d27530"/>
      <rect x="336" y="52" width="100" height="8" rx="4" fill="#f3ead560"/>
      <rect x="336" y="66" width="70" height="8" rx="4" fill="#f3ead535"/>
    </g>
  </g>

  <text x="450" y="620" text-anchor="middle" fill="#f3ead5" font-family="Inter, sans-serif" font-size="12" letter-spacing="2" opacity=".32">DIREÇÃO DE PROJETO — LANDING PAGE</text>
</svg>
